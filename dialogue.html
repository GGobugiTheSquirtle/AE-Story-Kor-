<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>어나더에덴 메인스토리 대사집</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
<meta name="description" content="어나더에덴 메인스토리 전 123장 대사집. 캐릭터별 대사와 나레이션.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0d1a;--bg2:#111428;--bg3:#1a1d35;
  --panel:#161930;--panel2:#1e2140;
  --gold:#c9a44c;--gold2:#b8963e;--gold-dim:#6b5a2a;--gold-bright:#e8cc6e;
  --text:#e8e0d0;--text2:#b0a590;--text-dim:#685e4e;
  --border:#2a2d45;--sidebar-w:220px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Serif KR','Malgun Gothic',serif;line-height:1.8;
  background-image:
    radial-gradient(ellipse 600px 600px at 20% 10%, rgba(30,40,80,.4) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 80% 90%, rgba(60,40,80,.2) 0%, transparent 70%);
  background-attachment:fixed;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 50%, rgba(201,164,76,.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,.1) 0%, transparent 100%);
}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold-bright)}

/* Top nav */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  background:linear-gradient(180deg, #181b30 0%, #111428 100%);
  border-bottom:1px solid var(--gold-dim);
  display:flex;align-items:center;padding:0 20px;height:48px;gap:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
}
.topnav::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent 0%, var(--gold-dim) 20%, var(--gold) 50%, var(--gold-dim) 80%, transparent 100%);
}
.topnav a{
  color:var(--text2);font-size:13px;padding:6px 14px;
  text-decoration:none;transition:all .3s;letter-spacing:.5px;
  border:1px solid transparent;border-radius:2px;
}
.topnav a:hover{color:var(--gold-bright);border-color:var(--gold-dim)}
.topnav a[aria-current]{color:var(--gold);border-color:var(--gold-dim);background:rgba(201,164,76,.08)}
.topnav .spacer{flex:1}
.topnav .title-mark{font-size:11px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin-left:auto}

/* Sidebar */
#sidebar{
  position:fixed;left:0;top:48px;bottom:0;width:var(--sidebar-w);
  background:linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  overflow-y:auto;z-index:100;
  border-right:1px solid var(--border);padding:0;transition:transform .3s;
}
#sidebar h2{
  color:var(--gold);font-size:12px;padding:16px 20px 8px;
  letter-spacing:3px;font-weight:400;
  border-bottom:1px solid var(--border);margin-bottom:4px;text-align:center;
}
.nav-part{
  color:var(--gold-dim);font-size:10px;padding:12px 16px 4px;
  letter-spacing:2px;text-transform:uppercase;
  border-top:1px solid var(--border);margin-top:4px;
}
.nav-item{
  display:block;padding:5px 16px;color:var(--text2);
  text-decoration:none;font-size:12px;
  border-left:2px solid transparent;transition:all .2s;letter-spacing:.3px;
}
.nav-item:hover{color:var(--gold-bright);background:rgba(201,164,76,.04);border-left-color:var(--gold-dim)}
.nav-item.active{color:var(--gold);background:rgba(201,164,76,.06);border-left-color:var(--gold)}

/* Main content */
#main{margin-left:var(--sidebar-w);padding:64px 24px 100px;max-width:820px;margin-right:auto}

/* Chapter header */
.chapter h2{
  color:var(--text);font-size:17px;padding:16px 0 12px;margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
  font-weight:400;letter-spacing:.5px;position:relative;border:none;
}
.chapter h2::before,.chapter h2::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg, var(--gold-dim), transparent);
}
.chapter h2::after{background:linear-gradient(270deg, var(--gold-dim), transparent)}
.chapter h2 .ch-num{
  font-size:10px;color:var(--gold);padding:3px 12px;white-space:nowrap;
  border:1px solid var(--gold-dim);letter-spacing:2px;background:rgba(201,164,76,.05);
}

/* Dialogue line */
.dl{display:flex;gap:12px;margin:6px 0;padding:8px 12px;border-radius:4px;transition:background .2s}
.dl:hover{background:rgba(201,164,76,.03)}
.dl-portrait{
  width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;
  border:2px solid var(--border);background:var(--bg3);margin-top:2px;
}
.dl-portrait img{width:100%;height:100%;object-fit:cover;object-position:center top}
.dl-portrait.no-img{
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text-dim);
}
.dl-body{flex:1;min-width:0}
.dl-name{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-bottom:1px}
.dl-text{font-size:14px;color:var(--text);line-height:1.7}

/* Narration */
.dl-narr{
  margin:10px 0;padding:10px 16px;
  background:rgba(138,122,96,.08);border-left:2px solid rgba(138,122,96,.3);
  font-style:italic;font-size:13px;color:var(--text2);line-height:1.7;
}

/* Chapter nav arrows */
.ch-nav{
  position:fixed;top:50%;transform:translateY(-50%);z-index:90;
  width:36px;height:56px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;
  font-size:22px;color:var(--text-dim);
  background:var(--panel);border:1px solid var(--border);
  border-radius:4px;transition:all .2s;
}
.ch-nav:hover{color:var(--gold);border-color:var(--gold-dim);background:var(--panel2)}
.ch-nav.disabled{pointer-events:none;opacity:.15}
#ch-prev{left:6px}
#ch-next{right:6px}

/* Bottom chapter nav */
.ch-bottom-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:24px 0;margin-top:24px;border-top:1px solid var(--border);
}
.ch-bottom-nav button{
  background:var(--panel);color:var(--text2);border:1px solid var(--border);
  padding:10px 24px;cursor:pointer;font-size:13px;
  font-family:inherit;letter-spacing:.5px;transition:all .2s;
  max-width:45%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ch-bottom-nav button:hover{color:var(--gold);border-color:var(--gold-dim)}
.ch-bottom-nav button:disabled{opacity:.3;pointer-events:none}
.ch-bottom-nav .ch-indicator{color:var(--text-dim);font-size:11px;letter-spacing:1px;flex-shrink:0}

/* Mobile */
#menu-toggle{
  display:none;position:fixed;top:52px;left:8px;z-index:200;
  background:var(--panel);color:var(--gold);
  border:1px solid var(--gold-dim);padding:6px 10px;cursor:pointer;font-size:16px;
}
#loading-msg{text-align:center;padding:60px;color:var(--text2);font-size:14px;letter-spacing:1px}
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
button.ch-nav{background:none;border:none;font:inherit}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:60px 12px 80px}
  #menu-toggle{display:block}
  .topnav .title-mark{display:none}
  .ch-nav{width:28px;height:44px;font-size:16px}
  #ch-prev{left:2px}
  #ch-next{right:2px}
  .dl-portrait{width:36px;height:36px}
}
</style>
</head>
<body>

<nav class="topnav" aria-label="메인 네비게이션">
  <a href="index.html">&larr; 인덱스</a>
  <a href="summary.html">요약본</a>
  <a href="detail.html">상세본</a>
  <a aria-current="page">대사집</a>
  <a href="full.html">전문</a>
  <span class="spacer"></span>
  <span class="title-mark">Another Eden &mdash; Dialogue</span>
</nav>

<button id="menu-toggle">&#9776;</button>
<nav id="sidebar" aria-label="장 목록"><h2>&#9670; &nbsp;목 차&nbsp; &#9670;</h2><div id="sidebar-nav"></div></nav>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<button id="ch-prev" class="ch-nav disabled" aria-label="이전 장">&#10094;</button>
<button id="ch-next" class="ch-nav disabled" aria-label="다음 장">&#10095;</button>
<main id="main"><div id="loading-msg">&#9670; 대사를 불러오는 중... &#9670;</div></main>

<script>
var mainEl=document.getElementById('main');
var sidebarNav=document.getElementById('sidebar-nav');
var prevBtn=document.getElementById('ch-prev');
var nextBtn=document.getElementById('ch-next');
var DATA=[];
var curIdx=0;

var PORTRAITS={};
var PORTRAIT_LIST=["길드너","남자아이","니르야","리이카","마도카","마수","미글랜스 왕","미나르카","바레스","베레토","사이러스","알도","알테나","애쉬티어","에이미","질퍼니","촌장","캄라녜쥬","키코","피네","합성귀룡","헬레나"];
PORTRAIT_LIST.forEach(function(n){PORTRAITS[n]=true});

function escH(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function renderCh(ch){
  var chEnd=ch.chapter_end;
  var label=chEnd?ch.chapter+'-'+chEnd+'장':ch.chapter+'장';
  var h='<div class="chapter">';
  h+='<h2><span class="ch-num">'+label+'</span>'+escH(ch.title||'')+'</h2>';

  var lines=ch.lines||[];
  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    if(line.type==='narration'){
      h+='<div class="dl-narr">'+escH(line.text)+'</div>';
    } else if(line.type==='dialogue'){
      var name=line.char||'???';
      var hasPortrait=PORTRAITS[name];
      h+='<div class="dl">';
      if(hasPortrait){
        h+='<div class="dl-portrait"><img src="images/chars/'+encodeURIComponent(name)+'.png" alt="'+escH(name)+'" loading="lazy"></div>';
      } else {
        h+='<div class="dl-portrait no-img">&#128100;</div>';
      }
      h+='<div class="dl-body"><div class="dl-name">'+escH(name)+'</div>';
      h+='<div class="dl-text">'+escH(line.text)+'</div></div></div>';
    }
  }

  var prevLabel=curIdx>0?(DATA[curIdx-1].chapter+'장 '+escH(DATA[curIdx-1].title||'')):'';
  var nextLabel=curIdx<DATA.length-1?(DATA[curIdx+1].chapter+'장 '+escH(DATA[curIdx+1].title||'')):'';
  h+='<div class="ch-bottom-nav">';
  h+='<button onclick="goCh(curIdx-1)"'+(curIdx<=0?' disabled':'')+'>&#10094; '+prevLabel+'</button>';
  h+='<span class="ch-indicator">'+(curIdx+1)+' / '+DATA.length+'</span>';
  h+='<button onclick="goCh(curIdx+1)"'+(curIdx>=DATA.length-1?' disabled':'')+'>'+nextLabel+' &#10095;</button>';
  h+='</div></div>';
  return h;
}

function goCh(idx){
  if(idx<0||idx>=DATA.length) return;
  curIdx=idx;
  showCurrentChapter();
}

function showCurrentChapter(){
  var ch=DATA[curIdx];
  mainEl.innerHTML=renderCh(ch);
  window.scrollTo(0,0);
  history.replaceState(null,null,'#ch-'+ch.chapter);
  prevBtn.classList.toggle('disabled',curIdx<=0);
  nextBtn.classList.toggle('disabled',curIdx>=DATA.length-1);
  document.querySelectorAll('.nav-item').forEach(function(a){
    a.classList.toggle('active',a.getAttribute('href')==='#ch-'+ch.chapter);
  });
}

prevBtn.onclick=function(){goCh(curIdx-1)};
nextBtn.onclick=function(){goCh(curIdx+1)};

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft') goCh(curIdx-1);
  else if(e.key==='ArrowRight') goCh(curIdx+1);
});

function buildSidebar(){
  var parts=[
    {label:'제1부 — 시공을 넘는 고양이', range:[1,26]},
    {label:'제1.5부 — 오우거 전쟁편', range:[27,44]},
    {label:'제2부 — 동방의 대지와 천공의 하늘', range:[45,72]},
    {label:'제2.5부 — 명협계·방주편', range:[73,87]},
    {label:'제3부 — 빛과 그림자의 끝에', range:[88,999]}
  ];
  var h='';var pi=0;
  for(var i=0;i<DATA.length;i++){
    var ch=DATA[i];
    while(pi<parts.length&&ch.chapter>=parts[pi].range[0]){
      h+='<div class="nav-part">&#9670; '+parts[pi].label+'</div>';
      pi++;
    }
    var chEnd=ch.chapter_end;
    var label=chEnd?ch.chapter+'-'+chEnd+'장':ch.chapter+'장';
    var title=ch.title?' · '+ch.title:'';
    h+='<a href="#ch-'+ch.chapter+'" class="nav-item" data-idx="'+i+'">'+label+title+'</a>';
  }
  sidebarNav.innerHTML=h;
  document.querySelectorAll('.nav-item').forEach(function(a){
    a.addEventListener('click',function(e){
      e.preventDefault();
      goCh(parseInt(this.dataset.idx));
      closeSidebar();
    });
  });
}

fetch('data/story_all.json').then(function(r){return r.json()}).then(function(data){
  DATA=data;
  buildSidebar();
  var startCh=0;
  if(window.location.hash){
    var hm=window.location.hash.match(/ch-(\d+)/);
    if(hm){
      var cn=parseInt(hm[1]);
      for(var i=0;i<DATA.length;i++){
        if(DATA[i].chapter===cn){startCh=i;break}
      }
    }
  }
  curIdx=startCh;
  showCurrentChapter();
}).catch(function(e){
  var errDiv=document.createElement('div');errDiv.id='loading-msg';errDiv.style.cssText='text-align:center;padding:60px;color:var(--gold);font-size:14px';errDiv.textContent=e.message;mainEl.innerHTML='';mainEl.appendChild(errDiv);
});

var sidebarEl=document.getElementById('sidebar');
var overlayEl=document.getElementById('sidebar-overlay');
function closeSidebar(){sidebarEl.classList.remove('open');overlayEl.style.display='none'}
function toggleSidebar(){var open=sidebarEl.classList.toggle('open');overlayEl.style.display=open?'block':'none'}
document.getElementById('menu-toggle').addEventListener('click',toggleSidebar);
overlayEl.addEventListener('click',closeSidebar);
</script>
</body>
</html>
